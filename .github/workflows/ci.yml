name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify vendored dependencies
        run: npm run vendor:mathjax:check

      - name: Verify generated icons
        run: npm run icons:check

      - name: Verify release inputs
        run: npm run verify:release

      - name: Enforce 100% core line coverage
        run: npm run test:coverage

      - name: Check coverage badge
        run: npm run coverage:check

      - name: Lint extension
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Verify built ZIP
        run: npm run verify:zip

      - name: Smoke-test local rendering in Chrome
        run: npm run smoke:browser

      - name: Audit dependencies
        run: npm run audit
